<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeCasino 🎰</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
            user-select: none;
        }
        .game-card {
            max-width: 360px;
            margin: 10px auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid #2d2d2d;
        }
        h2 {
            margin-top: 0;
            color: #0088cc;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .round-indicator {
            font-size: 18px;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #262626;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #3d3d3d;
        }
        .stat-label { font-size: 11px; color: #aaa; text-transform: uppercase; }
        .stat-val { font-size: 18px; font-weight: bold; margin-top: 5px; }
        .target-highlight { color: #ff4444; }
        .score-highlight { color: #00ff66; }
        
        .slot-wrapper {
            background: #0f0f0f;
            padding: 25px 10px;
            border-radius: 16px;
            border: 3px solid #0088cc;
            margin-bottom: 20px;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        .slots-display {
            font-size: 54px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 8px;
            color: #00ff66;
            text-shadow: 0 0 12px rgba(0,255,102,0.4);
        }
        .meme-text {
            height: 45px;
            font-size: 16px;
            color: #ffcc00;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .spin-btn {
            background: linear-gradient(135deg, #0088cc, #00a2ff);
            color: white;
            border: none;
            padding: 16px;
            font-size: 20px;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,136,204,0.3);
            transition: transform 0.1s;
        }
        .spin-btn:active { transform: scale(0.97); }
        .spin-btn:disabled { background: #444; box-shadow: none; cursor: not-allowed; }

        .high-score {
            margin-top: 20px;
            background: #262626;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            color: #00ff66;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="game-card">
    <h2>🎰 MemeCasino</h2>
    <div class="round-indicator" id="roundDisplay">РАУНД: 1 (x1.0)</div>
    
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Очки / Цель</div>
            <div class="stat-val"><span id="score" class="score-highlight">0</span> / <span id="targetScore" class="target-highlight">10</span></div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Крутки</div>
            <div class="stat-val" id="spins">3/3</div>
        </div>
    </div>

    <div class="slot-wrapper">
        <div class="meme-text" id="memeAlert">Нажми крутить!</div>
        <div class="slots-display" id="slots">000</div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">КРУТИТЬ СЛОТ</button>

    <div class="high-score">
        🏆 Рекорд (Макс. Раунд): <span id="bestRecord">1</span>
    </div>
</div>
<script>
    let currentRound = 1;
    let score = 0;
    
    let baseSpins = 3; 
    let spinsLeft = 3;
    let targetScore = 10; 
    let roundMultiplier = 1.0; 

    let maxRoundRecord = localStorage.getItem('MemeCasino_max_round') || 1;

    const tripleCombos = {
        "111": { text: "⭐ ОДИНЕШЕНЬКИ! +25 очков", bonus: 25, sound: "triple.mp3" },
        "222": { text: "⭐ ДВОЙНОЙ УДАР! +25 очков", bonus: 25, sound: "triple.mp3" },
        "333": { text: "🍌 СУЕЕЕЕТААА! +25 очков", bonus: 25, sound: "sueta.mp3" },
        "444": { text: "⭐ ЧЕТЫРЕ ЧЕТВЕРТИ! +25 очков", bonus: 25, sound: "triple.mp3" },
        "555": { text: "⭐ ОТЛИЧНИК! +25 очков", bonus: 25, sound: "triple.mp3" },
        "777": { text: "🎰 ТРИ ТОПОРА! ДЖЕКПОТ!", bonus: 200, sound: "jackpot.mp3" }, 
        "888": { text: "⭐ БЕСКОНЕЧНОСТЬ! +25 очков", bonus: 25, sound: "triple.mp3" },
        "999": { text: "⭐ ПОЧТИ ДЕМОН! +25 очков", bonus: 25, sound: "triple.mp3" }
    };

    const pairMultipliers = {
        "7": 2.0, "8": 1.2, "9": 1.3, "5": 1.5, "4": 1.1, "3": 3.0, "2": 1.0, "1": 1.0, "0": 1.0, "6": 1.0
    };

    document.getElementById('bestRecord').innerText = maxRoundRecord;
    updateUI();

    function playMemeSound(fileName) {
        let audio = new Audio(fileName); 
        audio.volume = 1.0; 
        audio.play().catch(e => console.log("Звук заблокирован", e));
    }

    function updateUI() {
        document.getElementById('roundDisplay').innerText = `РАУНД: ${currentRound} (x${roundMultiplier.toFixed(1)})`;
        document.getElementById('score').innerText = score;
        document.getElementById('targetScore').innerText = targetScore;
        document.getElementById('spins').innerText = `${spinsLeft}/${baseSpins + (currentRound - 1)}`;
    }

    // Новая функция блокировки
    function lockButton() {
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        setTimeout(() => { btn.disabled = false; }, 3000);
    }

    function spin() {
        if (spinsLeft <= 0) return;

        lockButton(); // ВЫЗОВ БЛОКИРОВКИ
        spinsLeft--;
        playMemeSound("click.mp3");

        let d1 = Math.floor(Math.random() * 10);
        let d2 = Math.floor(Math.random() * 10);
        let d3 = Math.floor(Math.random() * 10);
        let combo = `${d1}${d2}${d3}`;
        
        document.getElementById('slots').innerText = combo;

        let gained = 0;
        let msg = "";
        let isSevenCombo = false; 

        if (combo === "666") {
            score = 0; 
            msg = "👹 666! ОБНУЛЕНИЕ ВСЕХ ОЧКОВ!";
            setTimeout(() => { playMemeSound("demon.mp3"); }, 100);
        } else if (combo === "228") {
            let isBribe = Math.random() < 0.5;
            if (isBribe) {
                let oldScore = score;
                score = score > 0 ? score * 2 : 30;
                msg = `👮 228! Взятка зашла! Очки удвоены! (+${score - oldScore})`;
            } else {
                let lostPoints = Math.floor(score / 2);
                score = score - lostPoints;
                msg = `🚓 228! ОБЛАВА! Изъято половина очков! (-${lostPoints})`;
            }
            setTimeout(() => { playMemeSound("police.mp3"); }, 100);
        } else if (combo.includes("67")) {
            gained = 40;
            msg = `🔊 ЫЫЫЫ СЫКСЭВЕН ЫЫЫЫ! Поймал комбинацию ${combo}! (+40)`;
            setTimeout(() => { playMemeSound("sixseven.mp3"); }, 100);
        } else if (tripleCombos[combo]) {
            gained = tripleCombos[combo].bonus;
            msg = tripleCombos[combo].text;
            if (combo === "777") isSevenCombo = true;
            setTimeout(() => { playMemeSound(tripleCombos[combo].sound); }, 100);
        } else if (d1 === d2 || d2 === d3 || d1 === d3) {
            let pairedDigit = (d1 === d2) ? d1 : ((d2 === d3) ? d2 : d1);
            let digitMult = pairMultipliers[pairedDigit] || 1.0;
            gained = Math.round(5 * digitMult * roundMultiplier);
            msg = `🪙 Пара [${pairedDigit}]! Дает 5 x${digitMult} x${roundMultiplier.toFixed(1)} = +${gained} очков!`;
            if (pairedDigit === 7) isSevenCombo = true;
        } else {
            gained = 3; 
            msg = "👀 Просто цифры... (+3)";
        }

        if (combo !== "228" && combo !== "666") {
            score += gained;
        }

        updateUI();
        document.getElementById('memeAlert').innerText = msg;
        checkRoundStatus(isSevenCombo);
    }

    function checkRoundStatus(isSevenCombo) {
        if (score >= targetScore) {
            document.getElementById('spinBtn').disabled = true;
            if (isSevenCombo && score > targetScore) {
                setTimeout(skipRoundBonus, 1000);
            } else {
                setTimeout(nextRound, 1000);
            }
            return;
        }

        if (spinsLeft === 0 && score < targetScore) {
            document.getElementById('spinBtn').disabled = true;
            setTimeout(gameOver, 1000);
        }
    }

    function nextRound() {
        document.getElementById('memeAlert').innerHTML = `🎉 РАУНД ${currentRound} ПРОЙДЕН! (${score}/${targetScore})`;
        
        setTimeout(() => {
            currentRound++;
            targetScore += 5; // Увеличиваем на 5
            roundMultiplier += 0.1; // Растет
            spinsLeft = baseSpins + (currentRound - 1); 
            score = 0; // ОБНУЛЕНИЕ
            
            updateUI();
            document.getElementById('slots').innerText = "000";
            document.getElementById('memeAlert').innerText = "Новый раунд начался! Погнали!";
            document.getElementById('spinBtn').disabled = false;
        }, 3000); 
    }

    function skipRoundBonus() {
        document.getElementById('memeAlert').innerHTML = `🚀 ОВЕРДРАЙВ! ПРЫЖОК НА +2 РАУНДА!`;
        
        setTimeout(() => {
            currentRound += 2; 
            targetScore += 10; 
            roundMultiplier += 0.2; 
            spinsLeft = baseSpins + (currentRound - 1);
            score = 0; // ОБНУЛЕНИЕ
            
            updateUI();
            document.getElementById('slots').innerText = "000";
            document.getElementById('memeAlert').innerText = "Ты улетел вперед на ракете семерок!";
            document.getElementById('spinBtn').disabled = false;
        }, 3000);
    }

    function gameOver() {
        document.getElementById('memeAlert').innerHTML = `💥 КОНЕЦ ИГРЫ! Дошел до раунда: ${currentRound}`;
        
        if (currentRound > maxRoundRecord) {
            maxRoundRecord = currentRound;
            localStorage.setItem('MemeCasino_max_round', maxRoundRecord);
            document.getElementById('bestRecord').innerText = maxRoundRecord;
        }

        setTimeout(() => {
            currentRound = 1;
            score = 0;
            targetScore = 10;
            roundMultiplier = 1.0; // СБРОС МНОЖИТЕЛЯ
            spinsLeft = baseSpins;
            
            updateUI();
            document.getElementById('slots').innerText = "000";
            document.getElementById('memeAlert').innerText = "Попробуй еще раз!";
            document.getElementById('spinBtn').disabled = false;
        }, 3000);
    }
</script>
</body>
</html>
